<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ana Chiossi — Production Sound Mixer & Boom Operator</title>
  <meta name="description" content="Ana Chiossi — Production Sound Mixer and Boom Operator based in Rome, Italy. Feature films, series, documentaries. Credits on Netflix, Disney+, HBO, Amazon Prime.">
  <meta property="og:title" content="Ana Chiossi — Production Sound Mixer">
  <meta property="og:description" content="Production Sound Mixer & Boom Operator · Rome, Italy · 14 years · 65+ projects">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/hub_hero.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: #060300;
    }

    /* ── Stage ────────────────────────────────────────────────── */
    .hub {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Background ───────────────────────────────────────────── */
    .hub-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hub-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 80% center;
      display: block;
    }

    @media (min-width: 768px) {
      .hub-bg img { object-position: 62% center; }
    }

    /* ── Overlay: vignette + strong bottom ─────────────────────── */
    /* Preserves the warm amber glow at the image centre */
    .hub-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(
          to top,
          rgba(4, 2, 0, 0.97) 0%,
          rgba(4, 2, 0, 0.86) 16%,
          rgba(4, 2, 0, 0.48) 34%,
          rgba(4, 2, 0, 0.06) 52%,
          transparent 68%
        ),
        radial-gradient(
          ellipse 88% 78% at 64% 40%,
          transparent 22%,
          rgba(3, 1, 0, 0.18) 48%,
          rgba(3, 1, 0, 0.58) 72%,
          rgba(3, 1, 0, 0.80) 100%
        );
    }

    /* ── Film grain ────────────────────────────────────────────── */
    .hub-grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23g)' opacity='0.12'/></svg>");
      background-size: 180px 180px;
      mix-blend-mode: screen;
      opacity: 0.55;
    }

    /* ── Name block ────────────────────────────────────────────── */
    .hub-name-block {
      position: absolute;
      z-index: 3;
      left: clamp(1.4rem, 5.5vw, 3.8rem);
      bottom: clamp(33%, 36vh, 46vh);
    }

    .hub-ana {
      display: block;
      font-family: 'Manrope', system-ui, sans-serif;
      font-weight: 500;
      font-size: clamp(0.58rem, 1.7vw, 0.88rem);
      text-transform: uppercase;
      letter-spacing: 0.48em;
      color: rgba(255, 208, 118, 0.78);
      margin-bottom: 0.1em;
    }

    /* sr-only fallback: the h1 gets a clean aria-label */
    .hub-chiossi {
      display: block;
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 13.5vw, 10.5rem);
      line-height: 0.86;
      letter-spacing: 0.015em;
      color: #fff;
      text-transform: uppercase;
    }

    .hub-role {
      display: block;
      margin-top: clamp(0.5rem, 1.3vh, 1rem);
      font-family: 'Manrope', system-ui, sans-serif;
      font-weight: 400;
      font-size: clamp(0.5rem, 1.35vw, 0.65rem);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: rgba(255, 208, 118, 0.48);
    }

    /* ── Bottom block ──────────────────────────────────────────── */
    .hub-bottom {
      position: absolute;
      z-index: 3;
      left: clamp(1.4rem, 5.5vw, 3.8rem);
      right: clamp(1.4rem, 5.5vw, 3.8rem);
      bottom: clamp(1.3rem, 3.2vh, 2rem);
      display: flex;
      flex-direction: column;
      gap: clamp(0.85rem, 2vh, 1.4rem);
    }

    /* ── Nav ───────────────────────────────────────────────────── */
    .hub-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    @media (min-width: 768px) {
      .hub-nav {
        flex-direction: row;
        align-items: baseline;
        gap: clamp(2rem, 5vw, 4.2rem);
      }
    }

    .hub-nav li a {
      display: flex;
      align-items: baseline;
      gap: 0.55em;
      text-decoration: none;
      color: rgba(255, 255, 255, 0.80);
      font-size: clamp(1rem, 4.4vw, 1.65rem);
      font-weight: 500;
      letter-spacing: 0.01em;
      padding: clamp(0.36rem, 1vh, 0.52rem) 0;
      min-height: 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: color 0.22s, transform 0.2s;
    }

    .hub-nav li:last-child a { border-bottom: none; }

    .hub-nav li a:hover {
      color: rgba(255, 215, 140, 0.95);
    }

    @media (min-width: 768px) {
      .hub-nav li a {
        border-bottom: none;
        min-height: auto;
        padding: 0;
        position: relative;
      }
      .hub-nav li a::after {
        content: '';
        position: absolute;
        left: 0; bottom: -3px;
        width: 0; height: 1px;
        background: rgba(255, 215, 140, 0.65);
        transition: width 0.26s ease;
      }
      .hub-nav li a:hover::after { width: 100%; }
      .hub-nav li a:hover { transform: none; }
    }

    .hub-nav .n {
      font-size: 0.52em;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255, 200, 100, 0.55);
    }

    /* Hidden — remove class="hub-link-hidden" from the <li> once bts.html exists */
    .hub-link-hidden { display: none; }

    /* ── Social ────────────────────────────────────────────────── */
    .hub-social {
      display: flex;
      align-items: center;
      gap: clamp(0.85rem, 2.6vw, 1.45rem);
    }

    .hub-social a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.38);
      text-decoration: none;
      min-width: 28px; min-height: 28px;
      transition: color 0.22s;
    }

    .hub-social a:hover { color: rgba(255, 215, 140, 0.88); }

    .hub-imdb {
      font-family: 'Manrope', system-ui, sans-serif;
      font-weight: 700;
      font-size: 0.64rem;
      letter-spacing: 0.06em;
    }

    /* ── Location tag ──────────────────────────────────────────── */
    .hub-location {
      position: absolute;
      z-index: 3;
      top: clamp(1.4rem, 3.5vh, 2.4rem);
      right: clamp(1.4rem, 5.5vw, 3.8rem);
      font-family: 'Manrope', system-ui, sans-serif;
      font-weight: 400;
      font-size: clamp(0.52rem, 1.4vw, 0.65rem);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: rgba(255, 255, 255, 0.32);
    }

    /* ── Animations ────────────────────────────────────────────── */

    /* Hidden initial states */
    .hub-bg img         { opacity: 0; transform: scale(1.06); }
    .hub-ana            { opacity: 0; letter-spacing: 1.1em; }
    .hub-chiossi        { opacity: 0; transform: translateY(1.8rem); }
    .hub-role           { opacity: 0; }
    .hub-location       { opacity: 0; }
    .hub-nav li         { opacity: 0; transform: translateY(0.7rem); }
    .hub-social         { opacity: 0; }

    @keyframes bgReveal {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes anaReveal {
      to { opacity: 1; letter-spacing: 0.48em; }
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Applied by JS */
    .hub-anim .hub-bg img {
      animation: bgReveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0s forwards;
    }
    .hub-anim .hub-ana {
      animation: anaReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }
    .hub-anim .hub-chiossi {
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.32s forwards;
    }
    .hub-anim .hub-role {
      animation: fadeIn 0.55s ease 0.62s forwards;
    }
    .hub-anim .hub-location {
      animation: fadeIn 0.55s ease 0.7s forwards;
    }
    .hub-anim .hub-nav li:nth-child(1) {
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) 0.88s forwards;
    }
    .hub-anim .hub-nav li:nth-child(2) {
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.02s forwards;
    }
    .hub-anim .hub-nav li:nth-child(3) {
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.16s forwards;
    }
    .hub-anim .hub-nav li:nth-child(4) {
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) 1.30s forwards;
    }
    .hub-anim .hub-social {
      animation: fadeIn 0.5s ease 1.38s forwards;
    }

    /* Show immediately (session revisit) */
    .hub-skip .hub-bg img,
    .hub-skip .hub-ana,
    .hub-skip .hub-chiossi,
    .hub-skip .hub-role,
    .hub-skip .hub-location,
    .hub-skip .hub-nav li,
    .hub-skip .hub-social {
      opacity: 1;
      transform: none;
      letter-spacing: 0.48em; /* reset ana tracking */
      animation: none;
    }
    /* role and location have no transform to reset */
    .hub-skip .hub-role,
    .hub-skip .hub-location,
    .hub-skip .hub-social {
      letter-spacing: normal;
    }
    .hub-skip .hub-ana {
      letter-spacing: 0.48em;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .hub-bg img,
      .hub-ana,
      .hub-chiossi,
      .hub-role,
      .hub-location,
      .hub-nav li,
      .hub-social {
        opacity: 1 !important;
        transform: none !important;
        letter-spacing: inherit !important;
        animation: none !important;
      }
      .hub-ana { letter-spacing: 0.48em !important; }
    }
  </style>
</head>

<script>
  (function () {
    var hub     = document.getElementById('hub');
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var played  = sessionStorage.getItem('hub-played');

    if (reduced || played) {
      hub.classList.add('hub-skip');
    } else {
      hub.classList.add('hub-anim');
      sessionStorage.setItem('hub-played', '1');
    }
  }());
</script>
