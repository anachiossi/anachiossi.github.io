      - paragraph [ref=e59]: Production sound mixer and boom operator based in Rome, Italy. Born in Brazil, I've spent 14 years working across feature films, series, documentaries, and advertising — in Portuguese, English, Spanish, Italian, et un petit peu du Français.
      - paragraph [ref=e60]: Before moving into sound, I worked as a camera assistant — as a focus puller, video assist, and loader. That background gives me a particular sensitivity to the relationship between image and audio on set, and helps me communicate naturally with directors and cinematographers from day one.
      - paragraph [ref=e61]: Over 66 projects, I've collaborated with 122 production companies. My work has reached audiences on Netflix, Disney+, HBO, and Amazon Prime.
