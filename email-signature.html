<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 40px;
      margin: 0;
    }
    .instructions {
      font-family: sans-serif;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <p class="instructions">Select the signature below, copy, then paste into Gmail → Settings → Signature.</p>

  <table id="signature" cellpadding="0" cellspacing="0" border="0"
    style="font-family: 'Manrope', Arial, sans-serif; color: #111111; border-left: 2px solid #111111; padding-left: 14px; text-align: left; background-color: #ffffff;">
    <tr>
      <td style="padding-bottom: 4px; vertical-align: top; background-color: #ffffff;">
        <span style="font-size: 16px; font-weight: 600; letter-spacing: 0.03em; font-family: 'Manrope', Arial, sans-serif;">Ana Chiossi</span>
      </td>
    </tr>
    <tr>
      <td style="padding-bottom: 2px; vertical-align: top; background-color: #ffffff;">
        <span style="font-size: 12px; font-weight: 400; color: #555555; letter-spacing: 0.02em; font-family: 'Manrope', Arial, sans-serif;">+39 338 3574233</span>
      </td>
    </tr>
    <tr>
      <td style="vertical-align: top; background-color: #ffffff;">
        <a href="http://anachiossi.github.io"
          style="font-size: 12px; font-weight: 400; color: #111111; letter-spacing: 0.02em; text-decoration: none; border-bottom: 1px solid #111111; font-family: 'Manrope', Arial, sans-serif;">anachiossi.github.io</a>
      </td>
    </tr>
  </table>
</body>
</html>
